<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F0E4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5F0EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FECDD3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B8F5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9918F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative border -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4" />

  <!-- Top decorative flourish -->
  <path d="M500 100 Q600 60 700 100" fill="none" stroke="#6B8F5E" stroke-width="2" opacity="0.5" />
  <circle cx="600" cy="80" r="4" fill="#6B8F5E" opacity="0.5" />
  <path d="M540 90 Q600 70 660 90" fill="none" stroke="#C9918F" stroke-width="1.5" opacity="0.4" />

  <!-- Heart icon -->
  <g transform="translate(565, 130)">
    <path d="M35 20 C35 10 25 0 15 0 C5 0 0 8 0 15 C0 30 35 55 35 55 C35 55 70 30 70 15 C70 8 65 0 55 0 C45 0 35 10 35 20Z" fill="#C9918F" opacity="0.7" />
  </g>

  <!-- App name -->
  <text x="600" y="240" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="56" font-weight="700" fill="#2D3B2D">
    Merrily Plan
  </text>

  <!-- Tagline -->
  <text x="600" y="295" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="24" fill="#5A6B5A" font-weight="400">
    Your Dream Wedding, Perfectly Planned
  </text>

  <!-- Divider -->
  <line x1="450" y1="325" x2="750" y2="325" stroke="url(#accent)" stroke-width="1.5" opacity="0.4" />

  <!-- Feature pills -->
  <g font-family="'Inter', 'Segoe UI', sans-serif" font-size="15" font-weight="500">
    <!-- Row 1 -->
    <rect x="200" y="355" width="140" height="34" rx="17" fill="#6B8F5E" opacity="0.15" />
    <text x="270" y="377" text-anchor="middle" fill="#3D5C34">Budget Tracker</text>

    <rect x="360" y="355" width="120" height="34" rx="17" fill="#6B8F5E" opacity="0.15" />
    <text x="420" y="377" text-anchor="middle" fill="#3D5C34">Guest List</text>

    <rect x="500" y="355" width="160" height="34" rx="17" fill="#6B8F5E" opacity="0.15" />
    <text x="580" y="377" text-anchor="middle" fill="#3D5C34">Seating Charts</text>

    <rect x="680" y="355" width="150" height="34" rx="17" fill="#6B8F5E" opacity="0.15" />
    <text x="755" y="377" text-anchor="middle" fill="#3D5C34">Vendor Tools</text>

    <rect x="850" y="355" width="160" height="34" rx="17" fill="#6B8F5E" opacity="0.15" />
    <text x="930" y="377" text-anchor="middle" fill="#3D5C34">Day-of Timeline</text>

    <!-- Row 2 -->
    <rect x="265" y="400" width="170" height="34" rx="17" fill="#C9918F" opacity="0.15" />
    <text x="350" y="422" text-anchor="middle" fill="#8B4533">Wedding Website</text>

    <rect x="455" y="400" width="130" height="34" rx="17" fill="#C9918F" opacity="0.15" />
    <text x="520" y="422" text-anchor="middle" fill="#8B4533">RSVP Online</text>

    <rect x="605" y="400" width="140" height="34" rx="17" fill="#C9918F" opacity="0.15" />
    <text x="675" y="422" text-anchor="middle" fill="#8B4533">Works Offline</text>

    <rect x="765" y="400" width="180" height="34" rx="17" fill="#C9918F" opacity="0.15" />
    <text x="855" y="422" text-anchor="middle" fill="#8B4533">27+ Planning Tools</text>
  </g>

  <!-- Bottom text -->
  <text x="600" y="500" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="20" fill="#6B8F5E" font-weight="600">
    Free &amp; Open Source  |  Web  |  Mobile  |  Desktop
  </text>

  <!-- URL -->
  <text x="600" y="565" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="16" fill="#888" font-weight="400">
    app.merrilyplan.com
  </text>

  <!-- Bottom decorative flourish -->
  <path d="M500 540 Q600 560 700 540" fill="none" stroke="#C9918F" stroke-width="1.5" opacity="0.3" />
</svg>
